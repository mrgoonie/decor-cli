<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">decor-cli feature map</title>
  <desc id="desc">Illustrated list of decor-cli features with text labels.</desc>
  <defs>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <path d="M0 0V10" stroke="#111" stroke-width="1" opacity=".22"/>
    </pattern>
    <style>
      .box{fill:#fff;stroke:#111;stroke-width:3}
      .ink{fill:none;stroke:#111;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .title{font-family:"Bradley Hand","Comic Sans MS",cursive;font-size:48px;fill:#111}
      .name{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:28px;font-weight:700;fill:#111}
      .caption-bg{fill:#fff;opacity:.96}
      .desc{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:19px;fill:#374151}
      .num{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:22px;fill:#111}
    </style>
  </defs>
  <rect width="1500" height="980" fill="#fff"/>
  <text class="title" x="62" y="78">Feature map</text>
  <g transform="translate(60 125)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M36 96H184M56 53H252M78 123H216"/>
    <path class="ink" d="M298 38v84M256 80h84"/>
    <text class="name" x="36" y="42">Backgrounds</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">image, folder, R2 defaults, gradient</text>
  </g>
  <g transform="translate(540 125)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <rect x="40" y="48" width="160" height="78" rx="26" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <path class="ink" d="M238 94C286 50 337 137 378 76"/>
    <text class="name" x="36" y="42">Container styling</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">padding, radius, shadow, opacity</text>
  </g>
  <g transform="translate(1020 125)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M58 111C118 62 166 149 226 91"/>
    <path class="ink" d="M206 76L230 90L215 115"/>
    <text class="name" x="36" y="42">Annotations</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">text, arrows, shapes, counters</text>
  </g>
  <g transform="translate(60 335)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <rect x="46" y="48" width="150" height="86" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <circle cx="285" cy="92" r="44" fill="none" stroke="#111" stroke-width="3"/>
    <path class="ink" d="M46 134L196 48"/>
    <text class="name" x="36" y="42">Crop and alignment</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">crop rectangles plus 9-point placement</text>
  </g>
  <g transform="translate(540 335)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <rect x="44" y="50" width="148" height="82" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <path d="M44 50H192V132H44Z" fill="#111" opacity=".12"/>
    <rect x="82" y="67" width="74" height="48" fill="#fff" stroke="#111" stroke-width="3"/>
    <text class="name" x="36" y="42">Spotlight</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">bright focus regions, dim context</text>
  </g>
  <g transform="translate(1020 335)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M64 59H210M64 92H255M64 125H170"/>
    <path class="ink" d="M300 52v80M264 92h73"/>
    <text class="name" x="36" y="42">Text controls</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">font, wrap width, outline, shadow, box</text>
  </g>
  <g transform="translate(60 545)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <rect x="42" y="54" width="120" height="72" fill="none" stroke="#111" stroke-width="3"/>
    <circle cx="237" cy="91" r="39" fill="none" stroke="#111" stroke-width="3"/>
    <path class="ink" d="M306 124L372 58"/>
    <text class="name" x="36" y="42">Shapes</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">rectangles, circles, lines, fills</text>
  </g>
  <g transform="translate(540 545)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <circle cx="94" cy="90" r="42" fill="#fff" stroke="#111" stroke-width="3"/>
    <text class="num" x="81" y="99">1</text>
    <circle cx="184" cy="90" r="42" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <text class="num" x="171" y="99">2</text>
    <text class="name" x="36" y="42">Counters</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">numbered callouts for steps</text>
  </g>
  <g transform="translate(1020 545)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M63 115C145 45 242 147 343 57"/>
    <path class="ink" d="M313 52L347 55L336 89"/>
    <text class="name" x="36" y="42">Fancy arrows</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">thin tail, thicker head, curve control</text>
  </g>
  <g transform="translate(60 755)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M58 99H182M122 47V150"/>
    <path class="ink" d="M250 59L359 139M359 59L250 139"/>
    <text class="name" x="36" y="42">Input sources</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">file, URL, Base64, image, video</text>
  </g>
  <g transform="translate(540 755)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <path class="ink" d="M76 116H246V59H168V28H76Z"/>
    <path class="ink" d="M286 76L338 111L386 52"/>
    <text class="name" x="36" y="42">Export</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">quality, output path, overwrite safety</text>
  </g>
  <g transform="translate(1020 755)">
    <rect class="box" x="0" y="0" width="420" height="150" rx="8"/>
    <rect x="48" y="53" width="72" height="72" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <rect x="150" y="53" width="72" height="72" fill="#fff" stroke="#111" stroke-width="3"/>
    <rect x="252" y="53" width="72" height="72" fill="url(#hatch)" stroke="#111" stroke-width="3"/>
    <text class="name" x="36" y="42">Templates</text>
    <rect class="caption-bg" x="28" y="112" width="364" height="30"/>
    <text class="desc" x="36" y="134">named presets with demo-ready defaults</text>
  </g>
</svg>
